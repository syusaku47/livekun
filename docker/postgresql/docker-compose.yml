services:
  postgres:
    image: postgres:16
    container_name: livekun-postgres
    environment:
      POSTGRES_USER: livekun
      POSTGRES_PASSWORD: livekun
      POSTGRES_DB: livekun
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
